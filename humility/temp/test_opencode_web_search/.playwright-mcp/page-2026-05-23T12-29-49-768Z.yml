            - paragraph [ref=e42]:
              - text: Material UI is an open-source React component library that implements Google's
              - link "Material Design" [ref=e43] [cursor=pointer]:
                - /url: https://m2.material.io/
              - text: .
            - paragraph [ref=e44]: It includes a comprehensive collection of prebuilt components that are ready for use in production right out of the box and features a suite of customization options that make it easy to implement your own custom design system on top of our components.
            - complementary [ref=e45]:
              - img [ref=e47]
              - paragraph [ref=e50]:
                - text: Material UI supports Material Design 2. You can follow
                - link "this GitHub issue" [ref=e51] [cursor=pointer]:
                  - /url: https://github.com/mui/material-ui/issues/29345
                - text: for future design-related updates.
            - heading "Advantages of Material UI" [level=2] [ref=e52]:
              - link "Advantages of Material UI" [ref=e53] [cursor=pointer]:
                - /url: "#advantages-of-material-ui"
              - button "Post a comment" [ref=e54] [cursor=pointer]:
