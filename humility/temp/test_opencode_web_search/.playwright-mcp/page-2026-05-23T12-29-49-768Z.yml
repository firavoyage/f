            - list [ref=e55]:
              - listitem [ref=e56]:
                - strong [ref=e57]: "Ship faster:"
                - text: Over 2,500 open-source
                - link "contributors" [ref=e58] [cursor=pointer]:
                  - /url: https://github.com/mui/material-ui/graphs/contributors
                - text: have poured countless hours into these components. Focus on your core business logic instead of reinventing the wheel—we've got your UI covered.
              - listitem [ref=e59]:
                - strong [ref=e60]: "Beautiful by default:"
                - text: We're meticulous about our implementation of
                - link "Material Design" [ref=e61] [cursor=pointer]:
                  - /url: https://m2.material.io/
                - text: ", ensuring that every Material UI component meets the highest standards of form and function, but diverge from the official spec where necessary to provide multiple great options."
              - listitem [ref=e62]:
                - strong [ref=e63]: "Customizability:"
                - text: The library includes an extensive set of intuitive customizability features.
                - link "The templates" [ref=e64] [cursor=pointer]:
                  - /url: https://mui.com/store/
                - text: in our store demonstrate how far you can go with customization.
              - listitem [ref=e65]:
                - strong [ref=e66]: "Cross-team collaboration:"
                - text: Material UI's intuitive developer experience reduces the barrier to entry for back-end developers and less technical designers, empowering teams to collaborate more effectively. The
                - link "design kits" [ref=e67] [cursor=pointer]:
                  - /url: https://mui.com/design-kits/
                - text: streamline your workflow and boost consistency between designers and developers.
              - listitem [ref=e68]:
                - strong [ref=e69]: "Trusted by thousands of organizations:"
                - text: Material UI has the largest UI community in the React ecosystem. It's almost as old as React itself—its history stretches back to 2014—and we're in this for the long haul. You can count on the community's support for years to come (for example
                - link "Stack Overflow" [ref=e70] [cursor=pointer]:
                  - /url: https://trends.stackoverflow.co/?tags=material-ui
                - text: ).
