# adwaita design tokens

modes:
  theme:
    - light
    - dark
  accent:
    - blue
    - teal
    - green
    - yellow
    - orange
    - red
    - pink
    - purple
    - slate
  density:
    - comfortable
    - compact
    - cozy

ref:
  palette:
    # blue palette
    blue:
      1: "#99c1f1"
      2: "#62a0ea"
      3: "#3584e4"
      4: "#1c71d8"
      5: "#1a5fb4"

    # green palette
    green:
      1: "#8ff0a4"
      2: "#57e389"
      3: "#33d17a"
      4: "#2ec27e"
      5: "#26a269"

    # yellow palette
    yellow:
      1: "#f9f06b"
      2: "#f8e45c"
      3: "#f6d32d"
      4: "#f5c211"
      5: "#e5a50a"

    # orange palette
    orange:
      1: "#ffbe6f"
      2: "#ffa348"
      3: "#ff7800"
      4: "#e66100"
      5: "#c64600"

    # red palette
    red:
      1: "#f66151"
      2: "#ed333b"
      3: "#e01b24"
      4: "#c01c28"
      5: "#a51d2d"

    # purple palette
    purple:
      1: "#dc8add"
      2: "#c061cb"
      3: "#9141ac"
      4: "#813d9c"
      5: "#613583"

    # brown palette
    brown:
      1: "#cdab8f"
      2: "#b5835a"
      3: "#986a44"
      4: "#865e3c"
      5: "#63452c"

    # light palette
    light:
      1: "#ffffff"
      2: "#f6f5f4"
      3: "#deddda"
      4: "#c0bfbc"
      5: "#9a9996"

    # dark palette
    dark:
      1: "#77767b"
      2: "#5e5c64"
      3: "#3d3846"
      4: "#241f31"
      5: "#000000"

    # accent colors
    accent:
      blue: "#3584e4"
      teal: "#2190a4"
      green: "#3a944a"
      yellow: "#c88800"
      orange: "#ed5b00"
      red: "#e62d42"
      pink: "#d56199"
      purple: "#9141ac"
      slate: "#6f8396"

  spacing:
    1: "0.1875rem"
    2: "0.25rem"
    3: "0.375rem"
    4: "0.5625rem"
    5: "0.75rem"
    6: "1.125rem"
    8: "1.5rem"
    10: "2.25rem"
    12: "3rem"

  font:
    size:
      xs: "0.75rem"
      sm: "0.875rem"
      base: "1rem"
      lg: "1.125rem"
      xl: "1.25rem"
      "2xl": "1.5rem"
      "3xl": "1.875rem"
      "4xl": "2.25rem"
    line-height:
      tight: "1.25"
      normal: "1.5"
      relaxed: "1.75"
    weight:
      normal: "400"
      medium: "500"
      semibold: "600"
      bold: "700"
    family:
      document: '"Adwaita Sans", sans-serif'
      monospace: '"Adwaita Mono", monospace'

  radius:
    xs: "4px"
    sm: "6px"
    md: "9px"
    lg: "12px"
    xl: "15px"
    xxl: "18px"
    full: "9999px"

  transition:
    fast: "150ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
    normal: "200ms ease-out"
    slow: "300ms ease-out"
    backdrop: "200ms ease-out"

  z-index:
    base: "0"
    dropdown: "100"
    sticky: "200"
    modal: "300"
    popover: "400"
    tooltip: "500"
    toast: "600"

  shadow:
    sm: "0 1px 2px rgb(0 0 0 / 10%)"
    md: "0 4px 6px rgb(0 0 0 / 10%)"
    lg: "0 10px 15px rgb(0 0 0 / 10%)"
    xl: "0 20px 25px rgb(0 0 0 / 10%)"

  icon-size:
    small: "14px"
    normal: "16px"
    large: "32px"

  size-button:
    mini: "18px"
    small: "22px"
    medium: "28px"
    large: "36px"
    huge: "42px"
    mega: "58px"

  size-input:
    height: "28px"
    padding: "8px"
    radius: "5px"

  scrollbar:
    width: "8px"
    thumb: "#bbb"
    thumb-hover: "#999"
    thumb-active: "#888"

  focus-ring:
    color: "rgba(53, 132, 228, 0.5)"
    width: "2px"
    offset: "-2px"

  opacity:
    border: "15%"
    dim: "55%"
    disabled: "50%"

  window-radius: "15px"

sys:
  radius:
    button: "{ref.radius.md}"
    menu: "{ref.radius.md}"
    popover: "{ref.radius.xl}"
    dialog: "{ref.radius.xl}"
    check: "{ref.radius.sm}"
    alert: "{ref.radius.xxl}"

  color:
    # backgrounds
    bg:
      window:
        value: "{ref.palette.light.2}"
        dark: "#222226"
      view:
        value: "{ref.palette.light.1}"
        dark: "#1d1d20"
      secondary:
        value: "{ref.palette.light.3}"
        dark: "#2e2e32"
      headerbar:
        value: "{ref.palette.light.1}"
        dark: "#2e2e32"
      sidebar:
        value: "{ref.palette.light.3}"
        dark: "#2e2e32"
      secondary-sidebar:
        value: "{ref.palette.light.3}"
        dark: "#28282c"
      card:
        value: "{ref.palette.light.1}"
        dark: "rgb(255 255 255 / 8%)"
      overview:
        value: "{ref.palette.light.3}"
        dark: "#28282c"
      thumbnail:
        value: "{ref.palette.light.1}"
        dark: "#39393d"
      active-toggle:
        value: "{ref.palette.light.1}"
        dark: "rgb(255 255 255 / 20%)"
      dialog:
        value: "{ref.palette.light.2}"
        dark: "#36363a"
      popover:
        value: "{ref.palette.light.1}"
        dark: "#36363a"
      accent:
        value: "{ref.palette.accent.blue}"
        teal: "{ref.palette.accent.teal}"
        green: "{ref.palette.accent.green}"
        yellow: "{ref.palette.accent.yellow}"
        orange: "{ref.palette.accent.orange}"
        red: "{ref.palette.accent.red}"
        pink: "{ref.palette.accent.pink}"
        purple: "{ref.palette.accent.purple}"
        slate: "{ref.palette.accent.slate}"
      destructive:
        value: "{ref.palette.red.3}"
        dark: "{ref.palette.red.4}"
      success:
        value: "{ref.palette.green.4}"
        dark: "{ref.palette.green.5}"
      warning:
        value: "{ref.palette.yellow.4}"
        dark: "#cd9309"
      error:
        value: "{ref.palette.red.3}"
        dark: "{ref.palette.red.4}"
      button:
        value: "#f6f5f4"
        dark: "#464646"
      button-hover:
        value: "#f9f9f8"
        dark: "#5a5a5a"
      button-pressed:
        value: "#e8e7e6"
        dark: "#3a3a3a"
      button-border:
        value: "#cdc7c2"
        dark: "#1e1e20"

    # foregrounds
    fg:
      window:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      view:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      headerbar:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      sidebar:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      secondary-sidebar:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      card:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      overview:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      thumbnail:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      active-toggle:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      dialog:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      popover:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      accent:
        value: "{ref.palette.light.1}"
      secondary:
        value: "#686868"
        dark: "#a0a0a0"
      dimmed:
        value: "rgba(0 0 0 / 55%)"
        dark: "rgb(255 255 255 / 55%)"
      destructive:
        value: "{ref.palette.light.1}"
        dark: "{ref.palette.light.1}"
      success:
        value: "{ref.palette.light.1}"
        dark: "{ref.palette.light.1}"
      warning:
        value: "rgb(0 0 0 / 80%)"
        dark: "rgb(0 0 0 / 80%)"
      error:
        value: "{ref.palette.light.1}"
        dark: "{ref.palette.light.1}"

    # borders
    border:
      headerbar:
        value: "rgb(0 0 6 / 80%)"
        dark: "{ref.palette.light.1}"
      sidebar:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 36%)"
      secondary-sidebar:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 36%)"
      default:
        value: "color-mix(in srgb, currentColor {ref.opacity.border}, transparent)"
        dark: "color-mix(in srgb, currentColor 50%, transparent)"

    # shades
    shade:
      headerbar:
        value: "rgb(0 0 6 / 12%)"
        dark: "rgb(0 0 6 / 36%)"
      headerbar-darker:
        value: "rgb(0 0 6 / 12%)"
        dark: "rgb(0 0 6 / 90%)"
      sidebar:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 25%)"
      secondary-sidebar:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 25%)"
      card:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 36%)"
      popover:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 25%)"
      default:
        value: "rgb(0 0 6 / 7%)"
        dark: "rgb(0 0 6 / 25%)"

    # semantic colors
    destructive:
      value: "{ref.palette.red.4}"
      dark: "#ff938c"
    success:
      value: "{ref.palette.green.5}"
      dark: "#78e9ab"
    warning:
      value: "{ref.palette.yellow.5}"
      dark: "#ffc252"
    error:
      value: "{ref.palette.red.4}"
      dark: "#ff938c"

    # backdrop colors
    backdrop:
      headerbar:
        value: "{ref.palette.light.2}"
        dark: "#222226"
      sidebar:
        value: "#f2f2f4"
        dark: "#28282c"
      secondary-sidebar:
        value: "#f6f6fa"
        dark: "#252529"

    # opacity
    opacity:
      border:
        value: "15%"
        dark: "50%"
      dim:
        value: "55%"
        dark: "90%"
      disabled:
        value: "50%"
        dark: "40%"

    scrollbar-outline:
      value: "{ref.palette.light.1}"
      dark: "rgb(0 0 6 / 50%)"