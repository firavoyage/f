ref:
  color:
    blue-1: "#99c1f1"
    blue-2: "#62a0ea"
    blue-3: "#3584e4"
    blue-4: "#1c71d8"
    blue-5: "#1a5fb4"
    green-1: "#8ff0a4"
    green-2: "#57e389"
    green-3: "#33d17a"
    green-4: "#2ec27e"
    green-5: "#26a269"
    yellow-1: "#f9f06b"
    yellow-2: "#f8e45c"
    yellow-3: "#f6d32d"
    yellow-4: "#f5c211"
    yellow-5: "#e5a50a"
    orange-1: "#ffbe6f"
    orange-2: "#ffa348"
    orange-3: "#ff7800"
    orange-4: "#e66100"
    orange-5: "#c64600"
    red-1: "#f66151"
    red-2: "#ed333b"
    red-3: "#e01b24"
    red-4: "#c01c28"
    red-5: "#a51d2d"
    purple-1: "#dc8add"
    purple-2: "#c061cb"
    purple-3: "#9141ac"
    purple-4: "#813d9c"
    purple-5: "#613583"
    brown-1: "#cdab8f"
    brown-2: "#b5835a"
    brown-3: "#986a44"
    brown-4: "#865e3c"
    brown-5: "#63452c"
    light-1: "#ffffff"
    light-2: "#f6f5f4"
    light-3: "#deddda"
    light-4: "#c0bfbc"
    light-5: "#9a9996"
    dark-1: "#77767b"
    dark-2: "#5e5c64"
    dark-3: "#3d3846"
    dark-4: "#241f31"
    dark-5: "#000000"
    accent-blue: "#3584e4"
    accent-teal: "#2190a4"
    accent-green: "#3a944a"
    accent-yellow: "#c88800"
    accent-orange: "#ed5b00"
    accent-red: "#e62d42"
    accent-pink: "#d56199"
    accent-purple: "#9141ac"
    accent-slate: "#6f8396"
  spacing:
    1: "3px"
    2: "4px"
    3: "6px"
    4: "9px"
    5: "12px"
    6: "18px"
    8: "24px"
    10: "36px"
    12: "48px"
  font-size:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    lg: "1.125rem"
    xl: "1.25rem"
    2xl: "1.5rem"
    3xl: "1.875rem"
    4xl: "2.25rem"
  line-height:
    tight: 1.25
    normal: 1.5
    relaxed: 1.75
  font-weight:
    normal: 400
    medium: 500
    semibold: 600
    bold: 700
  font-family:
    document: '"Adwaita Sans", sans-serif'
    monospace: '"Adwaita Mono", monospace'
  radius:
    xs: "4px"
    sm: "6px"
    md: "9px"
    lg: "12px"
    xl: "15px"
    xxl: "18px"
    full: "9999px"
  transition:
    fast: "150ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
    normal: "200ms ease-out"
    slow: "300ms ease-out"
    backdrop: "200ms ease-out"
  z-index:
    base: 0
    dropdown: 100
    sticky: 200
    modal: 300
    popover: 400
    tooltip: 500
    toast: 600
  shadow:
    sm: "0 1px 2px rgb(0 0 0 / 10%)"
    md: "0 4px 6px rgb(0 0 0 / 10%)"
    lg: "0 10px 15px rgb(0 0 0 / 10%)"
    xl: "0 20px 25px rgb(0 0 0 / 10%)"
  icon-size:
    small: "14px"
    normal: "16px"
    large: "32px"
  opacity:
    border: "15%"
    dim: "55%"
    disabled: "50%"
  radius-button: "var(--ref.radius.md)"
  radius-card: "var(--ref.radius.lg)"
  radius-menu: "var(--ref.radius.md)"
  radius-popover: "var(--ref.radius.xl)"
  radius-dialog: "var(--ref.radius.xl)"
  radius-check: "var(--ref.radius.sm)"
  radius-alert: "var(--ref.radius.xxl)"

sys:
  color:
    accent: "#0461be"
    accent-bg: "{ref.color.accent-blue}"
    accent-fg: "{ref.color.light-1}"
    destructive: "{ref.color.red-4}"
    destructive-bg: "{ref.color.red-3}"
    destructive-fg: "{ref.color.light-1}"
    success: "{ref.color.green-5}"
    success-bg: "{ref.color.green-4}"
    success-fg: "{ref.color.light-1}"
    warning: "{ref.color.yellow-5}"
    warning-bg: "{ref.color.yellow-4}"
    warning-fg: "#000000"
    error: "{ref.color.red-4}"
    error-bg: "{ref.color.red-3}"
    error-fg: "{ref.color.light-1}"
  bg:
    window: "{ref.color.light-2}"
    window-fg: "rgb(0 0 6 / 80%)"
    view: "{ref.color.light-1}"
    view-fg: "rgb(0 0 6 / 80%)"
    secondary: "{ref.color.light-3}"
    headerbar: "{ref.color.light-1}"
    headerbar-fg: "rgb(0 0 6 / 80%)"
    headerbar-border: "rgb(0 0 6 / 80%)"
    headerbar-backdrop: "{ref.color.light-2}"
    sidebar: "{ref.color.light-3}"
    sidebar-fg: "rgb(0 0 6 / 80%)"
    sidebar-backdrop: "#f2f2f4"
    sidebar-border: "rgb(0 0 6 / 7%)"
    card: "{ref.color.light-1}"
    card-fg: "rgb(0 0 6 / 80%)"
    dialog: "{ref.color.light-2}"
    dialog-fg: "rgb(0 0 6 / 80%)"
    popover: "{ref.color.light-1}"
    popover-fg: "rgb(0 0 6 / 80%)"
    popover-shade: "rgb(0 0 6 / 7%)"
    text-secondary: "#686868"
    text-dimmed: "rgba(0 0 0 / 55%)"
  border:
    color: "color-mix(in srgb, currentColor var(--ref.opacity.border), transparent)"
  opacity:
    border: "{ref.opacity.border}"
    dim: "{ref.opacity.dim}"
    disabled: "{ref.opacity.disabled}"

comp:
  button:
    bg-color: "{ref.color.light-2}"
    bg-hover: "{ref.color.light-1}"
    bg-pressed: "#e8e7e6"
    border-color: "#cdc7c2"
    text-color: "{sys.color.view-fg}"
    font-size: "{ref.font-size.sm}"
    font-weight: 500
    padding: "{ref.spacing.2} {ref.spacing.4}"
  input:
    bg-color: "{ref.color.light-1}"
    border-color: "#cdc7c2"
    border-radius: "{ref.radius.md}"
    text-color: "{sys.color.view-fg}"
    font-size: "{ref.font-size.sm}"
    padding: "{ref.spacing.2} {ref.spacing.3}"
    border-color-hover: "{sys.color.accent}"
    border-color-focus: "{sys.color.accent}"
