# adwaita design tokens
# three-layer system: ref (primitives) -> sys (semantic) -> comp (component)

ref:
  color:
    # blue palette
    blue-1: "#99c1f1"
    blue-2: "#62a0ea"
    blue-3: "#3584e4"
    blue-4: "#1c71d8"
    blue-5: "#1a5fb4"

    # green palette
    green-1: "#8ff0a4"
    green-2: "#57e389"
    green-3: "#33d17a"
    green-4: "#2ec27e"
    green-5: "#26a269"

    # yellow palette
    yellow-1: "#f9f06b"
    yellow-2: "#f8e45c"
    yellow-3: "#f6d32d"
    yellow-4: "#f5c211"
    yellow-5: "#e5a50a"

    # orange palette
    orange-1: "#ffbe6f"
    orange-2: "#ffa348"
    orange-3: "#ff7800"
    orange-4: "#e66100"
    orange-5: "#c64600"

    # red palette
    red-1: "#f66151"
    red-2: "#ed333b"
    red-3: "#e01b24"
    red-4: "#c01c28"
    red-5: "#a51d2d"

    # purple palette
    purple-1: "#dc8add"
    purple-2: "#c061cb"
    purple-3: "#9141ac"
    purple-4: "#813d9c"
    purple-5: "#613583"

    # brown palette
    brown-1: "#cdab8f"
    brown-2: "#b5835a"
    brown-3: "#986a44"
    brown-4: "#865e3c"
    brown-5: "#63452c"

    # light palette
    light-1: "#ffffff"
    light-2: "#f6f5f4"
    light-3: "#deddda"
    light-4: "#c0bfbc"
    light-5: "#9a9996"

    # dark palette
    dark-1: "#77767b"
    dark-2: "#5e5c64"
    dark-3: "#3d3846"
    dark-4: "#241f31"
    dark-5: "#000000"

    # accent colors
    accent-blue: "#3584e4"
    accent-teal: "#2190a4"
    accent-green: "#3a944a"
    accent-yellow: "#c88800"
    accent-orange: "#ed5b00"
    accent-red: "#e62d42"
    accent-pink: "#d56199"
    accent-purple: "#9141ac"
    accent-slate: "#6f8396"

  spacing:
    space-1: "3px"
    space-2: "4px"
    space-3: "6px"
    space-4: "9px"
    space-5: "12px"
    space-6: "18px"
    space-8: "24px"
    space-10: "36px"
    space-12: "48px"

  font-size:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    lg: "1.125rem"
    xl: "1.25rem"
    "2xl": "1.5rem"
    "3xl": "1.875rem"
    "4xl": "2.25rem"

  line-height:
    tight: "1.25"
    normal: "1.5"
    relaxed: "1.75"

  font-weight:
    normal: "400"
    medium: "500"
    semibold: "600"
    bold: "700"

  font-family:
    document: '"Adwaita Sans", sans-serif'
    monospace: '"Adwaita Mono", monospace'

  border-radius:
    xs: "4px"
    sm: "6px"
    md: "9px"
    lg: "12px"
    xl: "15px"
    xxl: "18px"
    full: "9999px"

  transition:
    fast: "150ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
    normal: "200ms ease-out"
    slow: "300ms ease-out"
    backdrop: "200ms ease-out"

  z-index:
    base: "0"
    dropdown: "100"
    sticky: "200"
    modal: "300"
    popover: "400"
    tooltip: "500"
    toast: "600"

  shadow:
    sm: "0 1px 2px rgb(0 0 0 / 10%)"
    md: "0 4px 6px rgb(0 0 0 / 10%)"
    lg: "0 10px 15px rgb(0 0 0 / 10%)"
    xl: "0 20px 25px rgb(0 0 0 / 10%)"

  icon-size:
    small: "14px"
    normal: "16px"
    large: "32px"

  size-button:
    mini: "18px"
    small: "22px"
    medium: "28px"
    large: "36px"
    huge: "42px"
    mega: "58px"

  size-input:
    height: "28px"
    padding: "8px"
    radius: "5px"

  scrollbar:
    width: "8px"
    thumb: "#bbb"
    thumb-hover: "#999"
    thumb-active: "#888"

  focus-ring:
    color: "rgba(53, 132, 228, 0.5)"
    width: "2px"
    offset: "-2px"

  # helpers
  opacity:
    border: "15%"
    dim: "55%"
    disabled: "50%"

  window-radius: "15px"

sys:
  color:
    # accent
    accent: "#0461be"
    accent-bg: "{ref.color.accent-blue}"
    accent-fg: "{ref.color.light-1}"

    # destructive
    destructive: "{ref.color.red-4}"
    destructive-bg: "{ref.color.red-3}"
    destructive-fg: "{ref.color.light-1}"

    # success
    success: "{ref.color.green-5}"
    success-bg: "{ref.color.green-4}"
    success-fg: "{ref.color.light-1}"

    # warning
    warning: "{ref.color.yellow-5}"
    warning-bg: "{ref.color.yellow-4}"
    warning-fg: "rgb(0 0 0 / 80%)"

    # error
    error: "{ref.color.red-4}"
    error-bg: "{ref.color.red-3}"
    error-fg: "{ref.color.light-1}"

    # text
    text-secondary: "#686868"
    text-dimmed: "rgba(0 0 0 / 55%)"

  radius:
    button: "{ref.border-radius.md}"
    menu: "{ref.border-radius.md}"
    popover: "{ref.border-radius.xl}"
    dialog: "{ref.border-radius.xl}"
    check: "{ref.border-radius.sm}"
    alert: "{ref.border-radius.xxl}"

  # light theme
  light:
    color:
      window-bg: "{ref.color.light-2}"
      window-fg: "rgb(0 0 6 / 80%)"

      view-bg: "{ref.color.light-1}"
      view-fg: "rgb(0 0 6 / 80%)"

      secondary-bg: "{ref.color.light-3}"

      headerbar-bg: "{ref.color.light-1}"
      headerbar-fg: "rgb(0 0 6 / 80%)"
      headerbar-border: "rgb(0 0 6 / 80%)"
      headerbar-backdrop: "{ref.color.light-2}"
      headerbar-shade: "rgb(0 0 6 / 12%)"
      headerbar-darker-shade: "rgb(0 0 6 / 12%)"

      sidebar-bg: "{ref.color.light-3}"
      sidebar-fg: "rgb(0 0 6 / 80%)"
      sidebar-backdrop: "#f2f2f4"
      sidebar-border: "rgb(0 0 6 / 7%)"
      sidebar-shade: "rgb(0 0 6 / 7%)"

      secondary-sidebar-bg: "{ref.color.light-3}"
      secondary-sidebar-fg: "rgb(0 0 6 / 80%)"
      secondary-sidebar-backdrop: "#f6f6fa"
      secondary-sidebar-border: "rgb(0 0 6 / 7%)"
      secondary-sidebar-shade: "rgb(0 0 6 / 7%)"

      card-bg: "{ref.color.light-1}"
      card-fg: "rgb(0 0 6 / 80%)"
      card-shade: "rgb(0 0 6 / 7%)"

      overview-bg: "{ref.color.light-3}"
      overview-fg: "rgb(0 0 6 / 80%)"
      thumbnail-bg: "{ref.color.light-1}"
      thumbnail-fg: "rgb(0 0 6 / 80%)"

      active-toggle-bg: "{ref.color.light-1}"
      active-toggle-fg: "rgb(0 0 6 / 80%)"

      dialog-bg: "{ref.color.light-2}"
      dialog-fg: "rgb(0 0 6 / 80%)"

      popover-bg: "{ref.color.light-1}"
      popover-fg: "rgb(0 0 6 / 80%)"
      popover-shade: "rgb(0 0 6 / 7%)"

      shade: "rgb(0 0 6 / 7%)"
      scrollbar-outline: "{ref.color.light-1}"

      border: "color-mix(in srgb, currentColor {ref.opacity.border}, transparent)"

      btn-bg: "#f6f5f4"
      btn-hover: "#f9f9f8"
      btn-pressed: "#e8e7e6"
      btn-border: "#cdc7c2"

  # dark theme
  dark:
    color:
      accent: "{ref.color.accent-blue}"

      destructive: "#ff938c"
      destructive-bg: "{ref.color.red-4}"

      success: "#78e9ab"
      success-bg: "{ref.color.green-5}"

      warning: "#ffc252"
      warning-bg: "#cd9309"

      error: "#ff938c"
      error-bg: "{ref.color.red-4}"

      window-bg: "#222226"
      window-fg: "{ref.color.light-1}"

      view-bg: "#1d1d20"
      view-fg: "{ref.color.light-1}"

      secondary-bg: "#2e2e32"

      headerbar-bg: "#2e2e32"
      headerbar-fg: "{ref.color.light-1}"
      headerbar-border: "{ref.color.light-1}"
      headerbar-backdrop: "#222226"
      headerbar-shade: "rgb(0 0 6 / 36%)"
      headerbar-darker-shade: "rgb(0 0 6 / 90%)"

      sidebar-bg: "#2e2e32"
      sidebar-fg: "{ref.color.light-1}"
      sidebar-backdrop: "#28282c"
      sidebar-border: "rgb(0 0 6 / 36%)"
      sidebar-shade: "rgb(0 0 6 / 25%)"

      secondary-sidebar-bg: "#28282c"
      secondary-sidebar-fg: "{ref.color.light-1}"
      secondary-sidebar-backdrop: "#252529"
      secondary-sidebar-border: "rgb(0 0 6 / 36%)"
      secondary-sidebar-shade: "rgb(0 0 6 / 25%)"

      card-bg: "rgb(255 255 255 / 8%)"
      card-fg: "{ref.color.light-1}"
      card-shade: "rgb(0 0 6 / 36%)"

      overview-bg: "#28282c"
      overview-fg: "{ref.color.light-1}"
      thumbnail-bg: "#39393d"
      thumbnail-fg: "{ref.color.light-1}"

      active-toggle-bg: "rgb(255 255 255 / 20%)"
      active-toggle-fg: "{ref.color.light-1}"

      dialog-bg: "#36363a"
      dialog-fg: "{ref.color.light-1}"

      popover-bg: "#36363a"
      popover-fg: "{ref.color.light-1}"
      popover-shade: "rgb(0 0 6 / 25%)"

      shade: "rgb(0 0 6 / 25%)"
      scrollbar-outline: "rgb(0 0 6 / 50%)"

      border-opacity: "50%"
      dim-opacity: "90%"
      disabled-opacity: "40%"

      text-secondary: "#a0a0a0"
      text-dimmed: "rgb(255 255 255 / 55%)"

      btn-bg: "#464646"
      btn-hover: "#5a5a5a"
      btn-pressed: "#3a3a3a"
      btn-border: "#1e1e20"

comp:
  button:
    border-radius: "{sys.radius.button}"
    font-size: "{ref.font-size.sm}"
    font-weight: "500"
    padding-x: "{ref.spacing.space-2}"
    padding-y: "{ref.spacing.space-4}"
    transition: "{ref.transition.fast}"
    bg-color: "{sys.light.color.btn-bg}"
    hover-bg-color: "{sys.light.color.btn-hover}"
    pressed-bg-color: "{sys.light.color.btn-pressed}"
    border-color: "{sys.light.color.btn-border}"
    disabled-opacity: "{ref.opacity.disabled}"

  input:
    border-radius: "{ref.border-radius.md}"
    font-size: "{ref.font-size.sm}"
    padding-x: "{ref.spacing.space-3}"
    padding-y: "{ref.spacing.space-2}"
    bg-color: "{sys.light.color.view-bg}"
    border-color: "{sys.light.color.btn-border}"
    color: "{sys.light.color.view-fg}"
    focus-border-color: "{sys.color.accent}"
    focus-ring-color: "rgba(53, 132, 228, 0.5)"
    disabled-bg-color: "{ref.color.light-3}"
    disabled-opacity: "{ref.opacity.disabled}"

  checkbox:
    border-radius: "{sys.radius.check}"
    font-size: "{ref.font-size.sm}"
    size: "18px"
    bg-color: "{sys.light.color.view-bg}"
    border-color: "{sys.light.color.btn-border}"
    color: "{sys.light.color.view-fg}"
    checked-bg-color: "{sys.color.accent}"
    checked-border-color: "{sys.color.accent}"
    checked-color: "{ref.color.light-1}"
    hover-border-color: "{sys.color.accent}"
    disabled-opacity: "{ref.opacity.disabled}"

  select:
    trigger:
      border-radius: "{ref.border-radius.md}"
      font-size: "{ref.font-size.sm}"
      padding-x: "{ref.spacing.space-3}"
      padding-y: "{ref.spacing.space-2}"
      min-width: "160px"
      bg-color: "{sys.light.color.view-bg}"
      border-color: "{sys.light.color.btn-border}"
      color: "{sys.light.color.view-fg}"
      hover-border-color: "{sys.color.accent}"
    popup:
      border-radius: "{ref.border-radius.md}"
      bg-color: "{sys.light.color.popover-bg}"
      border-color: "{sys.light.color.btn-border}"
      shadow: "{ref.shadow.md}"
      padding: "{ref.spacing.space-1}"
    item:
      border-radius: "{ref.border-radius.sm}"
      font-size: "{ref.font-size.sm}"
      padding-x: "{ref.spacing.space-3}"
      padding-y: "{ref.spacing.space-2}"
      color: "{sys.light.color.view-fg}"
      hover-bg-color: "{sys.light.color.btn-hover}"
      selected-bg-color: "rgba(53, 132, 228, 0.2)"
      selected-color: "{sys.color.accent}"

  switch:
    font-size: "{ref.font-size.sm}"
    track:
      border-radius: "16px"
      width: "36px"
      height: "20px"
      bg-color: "{ref.color.light-3}"
      checked-bg-color: "{sys.color.accent}"
    thumb:
      border-radius: "50%"
      width: "16px"
      height: "16px"
      bg-color: "{ref.color.light-1}"
      shadow: "0 1px 3px rgb(0 0 6 / 20%)"
      offset: "2px"
      translate: "16px"
    disabled-opacity: "{ref.opacity.disabled}"

  slider:
    control-height: "20px"
    track:
      border-radius: "10px"
      height: "6px"
      bg-color: "{ref.color.light-3}"
    indicator:
      bg-color: "{sys.color.accent}"
    thumb:
      width: "18px"
      height: "18px"
      border-radius: "50%"
      border-color: "{sys.color.accent}"
      bg-color: "{ref.color.light-1}"
      hover-ring: "0 0 0 4px rgba(53, 132, 228, 0.2)"
      focus-ring: "0 0 0 4px rgba(53, 132, 228, 0.2)"

  number-field:
    group:
      border-radius: "{ref.border-radius.md}"
      border-color: "{sys.light.color.btn-border}"
    input:
      font-size: "{ref.font-size.sm}"
      padding-x: "{ref.spacing.space-3}"
      padding-y: "{ref.spacing.space-2}"
      bg-color: "{sys.light.color.view-bg}"
      color: "{sys.light.color.view-fg}"
      width: "60px"
      text-align: "center"
      focus-ring: "inset 0 0 0 2px rgba(53, 132, 228, 0.2)"
    button:
      font-size: "{ref.font-size.sm}"
      padding-x: "{ref.spacing.space-3}"
      padding-y: "{ref.spacing.space-2}"
      bg-color: "{sys.light.color.btn-bg}"
      color: "{sys.light.color.view-fg}"
      hover-bg-color: "{sys.light.color.btn-hover}"
      pressed-bg-color: "{sys.light.color.btn-pressed}"

  tooltip:
    border-radius: "{ref.border-radius.md}"
    font-size: "{ref.font-size.xs}"
    padding-x: "{ref.spacing.space-3}"
    padding-y: "{ref.spacing.space-2}"
    bg-color: "{sys.light.color.headerbar-bg}"
    color: "{sys.light.color.headerbar-fg}"
    shadow: "{ref.shadow.md}"

  scroll-area:
    viewport:
      border-radius: "{ref.border-radius.md}"
    scrollbar:
      width: "10px"
      padding: "2px"
      hover-bg: "rgb(0 0 0 / 13%)"
    thumb:
      border-radius: "10px"
      bg-color: "{ref.color.light-4}"
      hover-bg-color: "{ref.color.light-5}"

  app:
    font-family: "{ref.font-family.document}"
    bg-color: "{sys.light.color.view-bg}"
    color: "{sys.light.color.view-fg}"
    padding: "{ref.spacing.space-8}"
    section-margin: "{ref.spacing.space-10}"
    heading:
      font-size: "{ref.font-size.lg}"
      font-weight: "600"
      margin-bottom: "{ref.spacing.space-4}"
      color: "{sys.light.color.headerbar-fg}"
    demo:
      padding: "{ref.spacing.space-4}"
      gap: "{ref.spacing.space-4}"
      bg-color: "{sys.light.color.secondary-bg}"
      border-radius: "{ref.border-radius.md}"