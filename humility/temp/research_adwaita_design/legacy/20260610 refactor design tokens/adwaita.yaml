# adwaita design tokens

modes:
  theme:
    - light
    - dark
  accent:
    - blue
    - teal
    - green
    - yellow
    - orange
    - red
    - pink
    - purple
    - slate

ref:
  palette:
    # blue palette
    blue-1: "#99c1f1"
    blue-2: "#62a0ea"
    blue-3: "#3584e4"
    blue-4: "#1c71d8"
    blue-5: "#1a5fb4"

    # green palette
    green-1: "#8ff0a4"
    green-2: "#57e389"
    green-3: "#33d17a"
    green-4: "#2ec27e"
    green-5: "#26a269"

    # yellow palette
    yellow-1: "#f9f06b"
    yellow-2: "#f8e45c"
    yellow-3: "#f6d32d"
    yellow-4: "#f5c211"
    yellow-5: "#e5a50a"

    # orange palette
    orange-1: "#ffbe6f"
    orange-2: "#ffa348"
    orange-3: "#ff7800"
    orange-4: "#e66100"
    orange-5: "#c64600"

    # red palette
    red-1: "#f66151"
    red-2: "#ed333b"
    red-3: "#e01b24"
    red-4: "#c01c28"
    red-5: "#a51d2d"

    # purple palette
    purple-1: "#dc8add"
    purple-2: "#c061cb"
    purple-3: "#9141ac"
    purple-4: "#813d9c"
    purple-5: "#613583"

    # brown palette
    brown-1: "#cdab8f"
    brown-2: "#b5835a"
    brown-3: "#986a44"
    brown-4: "#865e3c"
    brown-5: "#63452c"

    # light palette
    light-1: "#ffffff"
    light-2: "#f6f5f4"
    light-3: "#deddda"
    light-4: "#c0bfbc"
    light-5: "#9a9996"

    # dark palette
    dark-1: "#77767b"
    dark-2: "#5e5c64"
    dark-3: "#3d3846"
    dark-4: "#241f31"
    dark-5: "#000000"

    # accent colors
    accent-blue: "#3584e4"
    accent-teal: "#2190a4"
    accent-green: "#3a944a"
    accent-yellow: "#c88800"
    accent-orange: "#ed5b00"
    accent-red: "#e62d42"
    accent-pink: "#d56199"
    accent-purple: "#9141ac"
    accent-slate: "#6f8396"

  spacing:
    space-1: "0.1875rem"
    space-2: "0.25rem"
    space-3: "0.375rem"
    space-4: "0.5625rem"
    space-5: "0.75rem"
    space-6: "1.125rem"
    space-8: "1.5rem"
    space-10: "2.25rem"
    space-12: "3rem"

  font-size:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    lg: "1.125rem"
    xl: "1.25rem"
    "2xl": "1.5rem"
    "3xl": "1.875rem"
    "4xl": "2.25rem"

  line-height:
    tight: "1.25"
    normal: "1.5"
    relaxed: "1.75"

  font-weight:
    normal: "400"
    medium: "500"
    semibold: "600"
    bold: "700"

  font-family:
    document: '"Adwaita Sans", sans-serif'
    monospace: '"Adwaita Mono", monospace'

  border-radius:
    xs: "4px"
    sm: "6px"
    md: "9px"
    lg: "12px"
    xl: "15px"
    xxl: "18px"
    full: "9999px"

  transition:
    fast: "150ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
    normal: "200ms ease-out"
    slow: "300ms ease-out"
    backdrop: "200ms ease-out"

  z-index:
    base: "0"
    dropdown: "100"
    sticky: "200"
    modal: "300"
    popover: "400"
    tooltip: "500"
    toast: "600"

  shadow:
    sm: "0 1px 2px rgb(0 0 0 / 10%)"
    md: "0 4px 6px rgb(0 0 0 / 10%)"
    lg: "0 10px 15px rgb(0 0 0 / 10%)"
    xl: "0 20px 25px rgb(0 0 0 / 10%)"

  icon-size:
    small: "14px"
    normal: "16px"
    large: "32px"

  size-button:
    mini: "18px"
    small: "22px"
    medium: "28px"
    large: "36px"
    huge: "42px"
    mega: "58px"

  size-input:
    height: "28px"
    padding: "8px"
    radius: "5px"

  scrollbar:
    width: "8px"
    thumb: "#bbb"
    thumb-hover: "#999"
    thumb-active: "#888"

  focus-ring:
    color: "rgba(53, 132, 228, 0.5)"
    width: "2px"
    offset: "-2px"

  opacity:
    border: "15%"
    dim: "55%"
    disabled: "50%"

  window-radius: "15px"

sys:
  radius:
    button:
      value: "{ref.border-radius.md}"
    menu:
      value: "{ref.border-radius.md}"
    popover:
      value: "{ref.border-radius.xl}"
    dialog:
      value: "{ref.border-radius.xl}"
    check:
      value: "{ref.border-radius.sm}"
    alert:
      value: "{ref.border-radius.xxl}"

  color:
    # accent
    accent-bg:
      value: "{ref.palette.accent-blue}"
      teal: "{ref.palette.accent-teal}"
      green: "{ref.palette.accent-green}"
      yellow: "{ref.palette.accent-yellow}"
      orange: "{ref.palette.accent-orange}"
      red: "{ref.palette.accent-red}"
      pink: "{ref.palette.accent-pink}"
      purple: "{ref.palette.accent-purple}"
      slate: "{ref.palette.accent-slate}"
    accent-fg: "{ref.palette.light-1}"

    # destructive
    destructive:
      value: "{ref.palette.red-4}"
      dark: "#ff938c"
    destructive-bg:
      value: "{ref.palette.red-3}"
      dark: "{ref.palette.red-4}"
    destructive-fg:
      value: "{ref.palette.light-1}"
      dark: "{ref.palette.light-1}"

    # success
    success:
      value: "{ref.palette.green-5}"
      dark: "#78e9ab"
    success-bg:
      value: "{ref.palette.green-4}"
      dark: "{ref.palette.green-5}"
    success-fg:
      value: "{ref.palette.light-1}"
      dark: "{ref.palette.light-1}"

    # warning
    warning:
      value: "{ref.palette.yellow-5}"
      dark: "#ffc252"
    warning-bg:
      value: "{ref.palette.yellow-4}"
      dark: "#cd9309"
    warning-fg:
      value: "rgb(0 0 0 / 80%)"
      dark: "rgb(0 0 0 / 80%)"

    # error
    error:
      value: "{ref.palette.red-4}"
      dark: "#ff938c"
    error-bg:
      value: "{ref.palette.red-3}"
      dark: "{ref.palette.red-4}"
    error-fg:
      value: "{ref.palette.light-1}"
      dark: "{ref.palette.light-1}"

    # text
    text-secondary:
      value: "#686868"
      dark: "#a0a0a0"
    text-dimmed:
      value: "rgba(0 0 0 / 55%)"
      dark: "rgb(255 255 255 / 55%)"

    # light theme colors
    window-bg:
      value: "{ref.palette.light-2}"
      dark: "#222226"
    window-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"

    view-bg:
      value: "{ref.palette.light-1}"
      dark: "#1d1d20"
    view-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"

    secondary-bg:
      value: "{ref.palette.light-3}"
      dark: "#2e2e32"

    headerbar-bg:
      value: "{ref.palette.light-1}"
      dark: "#2e2e32"
    headerbar-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    headerbar-border:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    headerbar-backdrop:
      value: "{ref.palette.light-2}"
      dark: "#222226"
    headerbar-shade:
      value: "rgb(0 0 6 / 12%)"
      dark: "rgb(0 0 6 / 36%)"
    headerbar-darker-shade:
      value: "rgb(0 0 6 / 12%)"
      dark: "rgb(0 0 6 / 90%)"

    sidebar-bg:
      value: "{ref.palette.light-3}"
      dark: "#2e2e32"
    sidebar-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    sidebar-backdrop:
      value: "#f2f2f4"
      dark: "#28282c"
    sidebar-border:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 36%)"
    sidebar-shade:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 25%)"

    secondary-sidebar-bg:
      value: "{ref.palette.light-3}"
      dark: "#28282c"
    secondary-sidebar-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    secondary-sidebar-backdrop:
      value: "#f6f6fa"
      dark: "#252529"
    secondary-sidebar-border:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 36%)"
    secondary-sidebar-shade:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 25%)"

    card-bg:
      value: "{ref.palette.light-1}"
      dark: "rgb(255 255 255 / 8%)"
    card-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    card-shade:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 36%)"

    overview-bg:
      value: "{ref.palette.light-3}"
      dark: "#28282c"
    overview-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    thumbnail-bg:
      value: "{ref.palette.light-1}"
      dark: "#39393d"
    thumbnail-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"

    active-toggle-bg:
      value: "{ref.palette.light-1}"
      dark: "rgb(255 255 255 / 20%)"
    active-toggle-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"

    dialog-bg:
      value: "{ref.palette.light-2}"
      dark: "#36363a"
    dialog-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"

    popover-bg:
      value: "{ref.palette.light-1}"
      dark: "#36363a"
    popover-fg:
      value: "rgb(0 0 6 / 80%)"
      dark: "{ref.palette.light-1}"
    popover-shade:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 25%)"

    shade:
      value: "rgb(0 0 6 / 7%)"
      dark: "rgb(0 0 6 / 25%)"
    scrollbar-outline:
      value: "{ref.palette.light-1}"
      dark: "rgb(0 0 6 / 50%)"

    border:
      value: "color-mix(in srgb, currentColor {ref.opacity.border}, transparent)"
      dark: "color-mix(in srgb, currentColor 50%, transparent)"

    btn-bg:
      value: "#f6f5f4"
      dark: "#464646"
    btn-hover:
      value: "#f9f9f8"
      dark: "#5a5a5a"
    btn-pressed:
      value: "#e8e7e6"
      dark: "#3a3a3a"
    btn-border:
      value: "#cdc7c2"
      dark: "#1e1e20"

    border-opacity:
      value: "15%"
      dark: "50%"
    dim-opacity:
      value: "55%"
      dark: "90%"
    disabled-opacity:
      value: "50%"
      dark: "40%"