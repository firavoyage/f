# adwaita extended design tokens
# additional tokens from libadwaita, adwaita_web, and adwave
# source priority: libadwaita >> adwaita_web > adwave

# ref layer additions (primitives)
ref:
  color:
    # interaction state colors - libadwaita
    hover: "color-mix(in srgb, currentColor 7%, transparent)"
    active: "color-mix(in srgb, currentColor 16%, transparent)"
    selected: "color-mix(in srgb, currentColor 10%, transparent)"
    selected-hover: "color-mix(in srgb, currentColor 13%, transparent)"
    selected-active: "color-mix(in srgb, currentColor 19%, transparent)"

    # view interaction states - libadwaita
    view-hover: "color-mix(in srgb, currentColor 4%, transparent)"
    view-active: "color-mix(in srgb, currentColor 8%, transparent)"
    view-selected: "color-mix(in srgb, var(--accent-bg-color) 25%, transparent)"
    view-selected-hover: "color-mix(in srgb, var(--accent-bg-color) 32%, transparent)"
    view-selected-active: "color-mix(in srgb, var(--accent-bg-color) 39%, transparent)"

    # trough colors for sliders - libadwaita
    trough: "color-mix(in srgb, currentColor 15%, transparent)"
    trough-hover: "color-mix(in srgb, currentColor 20%, transparent)"
    trough-active: "color-mix(in srgb, currentColor 25%, transparent)"

    # slider colors - libadwaita
    slider: "color-mix(in srgb, white 80%, var(--view-bg-color))"
    slider-hover: "white"

    # link colors - libadwaita
    link: "var(--accent-color)"
    link-visited: "color-mix(in srgb, var(--accent-color) 80%, var(--view-fg-color))"

    # OSD colors - libadwaita
    osd-fg: "RGB(255 255 255 / 90%)"
    osd-bg: "RGB(0 0 0 / 70%)"
    osd-link: "color-mix(in srgb, var(--accent-bg-color) 50%, white)"
    osd-link-visited: "color-mix(in srgb, var(--accent-bg-color) 75%, white)"

    # toast colors - libadwaita
    toast-bg: "#505053"
    toast-fg: "white"

    # tooltip border - libadwaita
    tooltip-border: "RGB(255 255 255 / 10%)"

    # drop target - libadwaita
    drop-target: "var(--accent-bg-color)"

    # window outline - libadwaita
    window-outline: "RGB(255 255 255 / 7%)"
    window-outline-hc: "RGB(255 255 255 / 30%)"

    # focus border - libadwaita
    focus-border: "color-mix(in srgb, var(--accent-color) 50%, transparent)"
    focus-border-hc: "color-mix(in srgb, var(--accent-color) 80%, transparent)"

    # dimmer - libadwaita
    dimmer: "30%"
    dimmer-hc: "80%"

    # strong disabled - libadwaita
    strong-disabled: "30%"

    # border opacity high contrast - libadwaita
    border-opacity-hc: "50%"
    focus-border-opacity-hc: "80%"

    # background levels - adwave
    bg-1: "hsl(0deg 0% 100%)"
    bg-2: "hsl(0deg 0% 96%)"
    bg-3: "hsl(0deg 0% 91%)"
    bg-4: "hsl(0deg 0% 100%)"
    bg-5: "hsl(0deg 0% 86%)"
    bg-6: "hsl(0deg 0% 80%)"

    # list elements - adwave
    list-elem: "hsl(0deg 0% 93%)"
    list-elem-border: "hsl(0deg 0% 100%)"
    list-elem-hover: "color-mix(in srgb, currentColor 10%, transparent)"

    # spinner - adwave
    spinner-bg: "#a9a9a9"
    spinner-fg: "#f2f2f2"

    # separator - adwaita_web
    separator: "#d8d4d0"

    # text info/success/warning/danger - adwaita_web
    text-info: "#3584e4"
    text-success: "#33d17a"
    text-warning: "#f57900"
    text-danger: "#e01b24"
    text-muted: "#929595"

  # additional border radius - adwave
  border-radius-default: "8px"

# sys layer additions (semantic)
sys:
  color:
    # link colors - libadwaita
    link: "{ref.color.link}"
    link-visited: "{ref.color.link-visited}"

    # hover/active/selected states - libadwaita
    hover: "{ref.color.hover}"
    active: "{ref.color.active}"
    selected: "{ref.color.selected}"
    selected-hover: "{ref.color.selected-hover}"
    selected-active: "{ref.color.selected-active}"

    # view interaction states - libadwaita
    view-hover: "{ref.color.view-hover}"
    view-active: "{ref.color.view-active}"
    view-selected: "{ref.color.view-selected}"
    view-selected-hover: "{ref.color.view-selected-hover}"
    view-selected-active: "{ref.color.view-selected-active}"

    # trough for sliders - libadwaita
    trough: "{ref.color.trough}"
    trough-hover: "{ref.color.trough-hover}"
    trough-active: "{ref.color.trough-active}"

    # slider - libadwaita
    slider: "{ref.color.slider}"
    slider-hover: "{ref.color.slider-hover}"

    # OSD - libadwaita
    osd-fg: "{ref.color.osd-fg}"
    osd-bg: "{ref.color.osd-bg}"
    osd-link: "{ref.color.osd-link}"
    osd-link-visited: "{ref.color.osd-link-visited}"

    # toast - libadwaita
    toast-bg: "{ref.color.toast-bg}"
    toast-fg: "{ref.color.toast-fg}"

    # tooltip border - libadwaita
    tooltip-border: "{ref.color.tooltip-border}"

    # drop target - libadwaita
    drop-target: "{ref.color.drop-target}"

    # window outline - libadwaita
    window-outline: "{ref.color.window-outline}"
    window-outline-hc: "{ref.color.window-outline-hc}"

    # focus border - libadwaita
    focus-border: "{ref.color.focus-border}"
    focus-border-hc: "{ref.color.focus-border-hc}"

    # dimmer - libadwaita
    dimmer: "{ref.color.dimmer}"
    dimmer-hc: "{ref.color.dimmer-hc}"

    # strong disabled - libadwaita
    strong-disabled: "{ref.color.strong-disabled}"

    # border opacity high contrast - libadwaita
    border-opacity-hc: "{ref.color.border-opacity-hc}"
    focus-border-opacity-hc: "{ref.color.focus-border-opacity-hc}"

    # text colors - adwaita_web
    text-info: "{ref.color.text-info}"
    text-success: "{ref.color.text-success}"
    text-warning: "{ref.color.text-warning}"
    text-danger: "{ref.color.text-danger}"
    text-muted: "{ref.color.text-muted}"

  # background levels - adwave
  light:
    color:
      # background levels
      bg-1: "{ref.color.bg-1}"
      bg-2: "{ref.color.bg-2}"
      bg-3: "{ref.color.bg-3}"
      bg-4: "{ref.color.bg-4}"
      bg-5: "{ref.color.bg-5}"
      bg-6: "{ref.color.bg-6}"

      # list elements
      list-elem: "{ref.color.list-elem}"
      list-elem-border: "{ref.color.list-elem-border}"
      list-elem-hover: "{ref.color.list-elem-hover}"

      # spinner
      spinner-bg: "{ref.color.spinner-bg}"
      spinner-fg: "{ref.color.spinner-fg}"

      # separator
      separator: "{ref.color.separator}"

  dark:
    color:
      # background levels - adwave dark theme
      bg-1: "hsl(0deg 0% 8%)"
      bg-2: "hsl(0deg 0% 12.12%)"
      bg-3: "hsl(0deg 0% 18.82%)"
      bg-4: "hsl(0deg 0% 18.82%)"
      bg-5: "hsl(0deg 0% 23.88%)"
      bg-6: "hsl(0deg 0% 29.37%)"

      # list elements dark - adwave
      list-elem: "hsl(0deg 0% 23%)"
      list-elem-border: "hsl(0deg 0% 18.82%)"
      list-elem-hover: "color-mix(in srgb, currentColor 7.5%, transparent)"

      # spinner dark - adwave
      spinner-bg: "#c6c6c6"
      spinner-fg: "#313131"

      # separator dark
      separator: "#3d3846"

  # additional semantic tokens
  # btn toggled state - adwave
  button:
    toggled-bg: "color-mix(in srgb, currentColor 15%, transparent)"

  # link colors - libadwaita
  link: "{ref.color.link}"
  link-visited: "{ref.color.link-visited}"

  # disabled cursor - adwave
  cursor:
    disabled: "not-allowed"