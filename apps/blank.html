<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- This prevents the filename from showing as the title -->
    <title>‍</title>

    <!-- Explicitly tell the browser where the favicon is -->
    <link rel="icon" type="image/x-icon" href="favicon.ico" />

    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #121212;
        height: 100vh;
        color: #eee;
        line-break: anywhere;
        font-size: 1.5rem;
      }
    </style>
  </head>
  <body contenteditable>
    <div class="root">
      <!-- Empty page with just dark background -->
    </div>
  </body>
  <script>
    (() => {
      // List of all standard HTML5 tags to keep intact
      const standardTags = new Set([
        "html",
        "head",
        "title",
        "base",
        "link",
        "meta",
        "style",
        "script",
        "noscript",
        "template",
        "body",
        "section",
        "nav",
        "article",
        "aside",
        "h1",
        "h2",
        "h3",
        "h4",
        "h5",
        "h6",
        "header",
        "footer",
        "address",
        "main",
        "p",
        "hr",
        "pre",
        "blockquote",
        "ol",
        "ul",
        "menu",
        "li",
        "dl",
        "dt",
        "dd",
        "figure",
        "figcaption",
        "div",
        "a",
        "em",
        "strong",
        "small",
        "s",
        "cite",
        "q",
        "dfn",
        "abbr",
        "ruby",
        "rt",
        "rp",
        "data",
        "time",
        "code",
        "var",
        "samp",
        "kbd",
        "sub",
        "sup",
        "i",
        "b",
        "u",
        "mark",
        "bdi",
        "bdo",
        "span",
        "br",
        "wbr",
        "ins",
        "del",
        "picture",
        "source",
        "img",
        "iframe",
        "embed",
        "object",
        "param",
        "video",
        "audio",
        "track",
        "map",
        "area",
        "table",
        "caption",
        "colgroup",
        "col",
        "tbody",
        "thead",
        "tfoot",
        "tr",
        "td",
        "th",
        "form",
        "label",
        "input",
        "button",
        "select",
        "datalist",
        "optgroup",
        "option",
        "textarea",
        "output",
        "progress",
        "meter",
        "fieldset",
        "legend",
        "details",
        "summary",
        "dialog",
      ]);

      // Main function to convert a specific element
      function convertToDiv(el) {
        const tagName = el.tagName.toLowerCase();

        // Check if the tag is non-standard and still attached to the DOM
        if (!standardTags.has(tagName) && el.parentNode) {
          // Disconnect observer temporarily to prevent infinite loops during manipulation
          observer.disconnect();

          const div = document.createElement("div");

          // Copy all original attributes
          for (const attr of el.attributes) {
            div.setAttribute(attr.name, attr.value);
          }

          // Move all children nodes
          while (el.firstChild) {
            div.appendChild(el.firstChild);
          }

          // Swap the old custom tag with the new div
          el.parentNode.replaceChild(div, el);

          // Re-engage the observer after the swap is finished
          startObserving();
        }
      }

      // Scan the entire branch of a newly added node
      function processNodeTree(node) {
        if (node.nodeType === Node.ELEMENT_NODE) {
          // Process all custom child tags first (bottom-up processing)
          const subElements = Array.from(node.querySelectorAll("*"));
          for (let i = subElements.length - 1; i >= 0; i--) {
            convertToDiv(subElements[i]);
          }
          // Process the top-level added element itself
          convertToDiv(node);
        }
      }

      // Define the observer behavior
      const observer = new MutationObserver((mutations) => {
        for (const mutation of mutations) {
          // Look for newly added elements dropped into the page
          if (mutation.addedNodes) {
            mutation.addedNodes.forEach(processNodeTree);
          }
        }
      });

      function startObserving() {
        observer.observe(document.body || document.documentElement, {
          childList: true, // Watch for elements being added or removed
          subtree: true, // Watch all nested descendants, not just top-level
        });
      }

      // 1. Run an initial sweep of the existing page structure
      const currentElements = Array.from(document.querySelectorAll("*"));
      for (let i = currentElements.length - 1; i >= 0; i--) {
        convertToDiv(currentElements[i]);
      }

      // 2. Start monitoring live changes in the background
      startObserving();
      console.log(
        "Live monitoring active. Standing by for non-standard tags..."
      );
    })();
  </script>
  <script>
    (() => {
      // Select common interactive elements
      const selectors =
        'button, a, input, select, textarea, [role="button"], [role="link"]';

      const convertToDiv = (el) => {
        // Prevent infinite loops on already processed elements
        if (el.tagName === "DIV" || el.dataset.converted === "true") return;

        const div = document.createElement("div");

        // Copy all HTML attributes
        Array.from(el.attributes).forEach((attr) => {
          div.setAttribute(attr.name, attr.value);
        });

        // Mark as converted
        div.setAttribute("data-converted", "true");

        // Copy inner content and value
        div.innerHTML = el.innerHTML;
        if (el.value && !div.hasAttribute("value")) {
          div.setAttribute("value", el.value);
        }

        // Copy property-based event listeners
        if (el.onclick) div.onclick = el.onclick;
        if (el.onmousedown) div.onmousedown = el.onmousedown;
        if (el.onmouseup) div.onmouseup = el.onmouseup;
        if (el.onkeydown) div.onkeydown = el.onkeydown;

        // Maintain basic layout consistency
        const display = window.getComputedStyle(el).display;
        div.style.display = display === "inline" ? "inline-block" : display;

        // Replace element safely if it still has a parent
        if (el.parentNode) {
          el.parentNode.replaceChild(div, el);
        }
      };

      const processNodes = (nodes) => {
        nodes.forEach((node) => {
          // Only process element nodes
          if (node.nodeType !== Node.ELEMENT_NODE) return;

          // Check the node itself
          if (node.matches(selectors)) {
            convertToDiv(node);
          }

          // Check all of its nested children
          const children = node.querySelectorAll(selectors);
          children.forEach(convertToDiv);
        });
      };

      // Run immediately on existing elements
      processNodes([document.body]);

      // Setup MutationObserver for dynamic changes
      const observer = new MutationObserver((mutations) => {
        // Temporarily disconnect to avoid infinite loops during conversion
        observer.disconnect();

        mutations.forEach((mutation) => {
          if (mutation.addedNodes.length) {
            processNodes(mutation.addedNodes);
          }
        });

        // Reconnect observer
        observer.observe(document.body, { childList: true, subtree: true });
      });

      // Start watching the DOM
      observer.observe(document.body, { childList: true, subtree: true });
      console.log(
        "MutationObserver active: Watching for interactive elements..."
      );
    })();
  </script>
</html>
