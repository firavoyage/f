<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>copy</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      #status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        user-select: none;
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: lowercase;
        color: rgba(255, 255, 255, 0.9);
      }

      #paste_area {
        position: fixed;
        inset: 0;
        outline: none;
        overflow: hidden;
        opacity: 0;
        white-space: pre-wrap;
      }

      #markdown-toggle,
      #svg-toggle,
      #keep-images-toggle,
      #normalize-empty-links-toggle,
      #prettier-toggle {
        position: fixed;
        left: 50%;
        transform: translateX(-50%);
        color: #fff;
        font-size: 14px;
        user-select: none;
        cursor: pointer;
      }

      #markdown-toggle {
        bottom: 88px;
      }

      #svg-toggle {
        bottom: 68px;
      }

      #keep-images-toggle {
        bottom: 48px;
      }

      #normalize-empty-links-toggle {
        bottom: 28px;
      }

      #prettier-toggle {
        bottom: 8px;
      }
    </style>
    <script type="module" src="./source/main.ts"></script>
  </head>
  <body>
    <div id="status">paste</div>

    <div
      id="paste_area"
      contenteditable="true"
      role="textbox"
      aria-label="paste area"
      spellcheck="false"
    ></div>

    <div id="markdown-toggle">markdown: off</div>
    <div id="svg-toggle">svg: off</div>
    <div id="keep-images-toggle">keep images: on</div>
    <div id="normalize-empty-links-toggle">normalize empty links: on</div>
    <div id="prettier-toggle">prettier: on</div>
  </body>
</html>
