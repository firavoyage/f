<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>copy</title>
    <style>
      :root {
        color-scheme: dark;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      body {
        position: relative;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      #status {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        pointer-events: none;
        user-select: none;
        font-size: 18px;
        letter-spacing: 0.08em;
        text-transform: lowercase;
        color: rgba(255, 255, 255, 0.9);
      }

      #paste_area {
        position: fixed;
        inset: 0;
        outline: none;
        overflow: hidden;

        /* invisible but still active */
        opacity: 0;

        /* allow css variables + inherited styles */
        white-space: pre-wrap;
      }
    </style>
    <script type="module" src="./source/main.ts"></script>
  </head>
  <body>
    <div id="status">paste</div>

    <div
      id="paste_area"
      contenteditable="true"
      role="textbox"
      aria-label="paste area"
      spellcheck="false"
    ></div>
  </body>
</html>
