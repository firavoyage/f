# use weight directly. it's not changeable or contextual. 

font:
  sans: '"Adwaita Sans", sans-serif'
  monospace: '"Adwaita Mono", monospace'

text:
  xs: 
    size: "0.75rem"
    height: "1rem"
  sm: 
    size: "0.875rem"
    height: "1.25rem"
  base: 
    size: "1rem"
    height: "1.5rem"
  lg: 
    size: "1.125rem"
    height: "1.75rem"
  xl: 
    size: "1.25rem"
    height: "1.75rem"
  2xl: 
    size: "1.5rem"
    height: "2rem"
  3xl: 
    size: "1.875rem"
    height: "2.25rem"
  4xl: 
    size: "2.25rem"
    height: "2.5rem"

# size: # icon-size
