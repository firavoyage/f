radius:
  xs: "2px"
  sm: "4px"
  base: "6px"
  md: "8px"
  lg: "12px"
  xl: "16px"
  2xl: "24px"
  3xl: "32px"
  
  # just go standard as it's a superset

  # xs: "4px"
